name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: BASE_PATH="/${{ github.event.repository.name }}/" npm run build

      - name: Create release archive
        run: cd dist && zip -r ../rookys-${{ github.ref_name }}.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rookys-${{ github.ref_name }}
          path: rookys-${{ github.ref_name }}.zip
          retention-days: 90

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            rookys-${{ github.ref_name }}.zip \
            --title "Rookys ${{ github.ref_name }}" \
            --generate-notes
